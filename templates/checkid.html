{% extends 'base.html' %}
{% block content %}
<section class="page-head">
  <div>
    <span class="eyebrow">Herramientas</span>
    <h2>CheckID</h2>
    <p>Consulta SAT por RFC o CURP. Los resultados son solo de referencia en esta pantalla.</p>
  </div>
</section>

<section class="form-card checkid-tool">
  <div class="grid-2">
    <label>RFC
      <input type="text" id="checkid-rfc" maxlength="13" placeholder="12–13 caracteres" autocomplete="off" autocapitalize="characters">
    </label>
    <label>CURP
      <input type="text" id="checkid-curp" maxlength="18" placeholder="18 caracteres" autocomplete="off" autocapitalize="characters">
    </label>
  </div>
  <p class="helper">Indica al menos uno de los dos. Si ambos tienen formato válido, se envía primero el RFC.</p>

  <div class="checkid-actions">
    <button type="button" class="btn btn-primary" id="checkid-submit">Consultar CheckID</button>
    <span class="checkid-loader" id="checkid-loader" hidden aria-hidden="true">Consultando…</span>
  </div>

  <div id="checkid-error" class="checkid-inline-error" hidden role="alert"></div>

  <div id="checkid-results-wrap" class="checkid-results-wrap" hidden>
    <h3 class="checkid-results-title">Resultado</h3>
    <dl class="checkid-dl" id="checkid-dl"></dl>
    <p class="helper checkid-meta" id="checkid-meta"></p>
  </div>
</section>

<script>
(function () {
  const RFC_MIN = 12;
  const CURP_LEN = 18;
  const ND = 'No disponible';

  const elRfc = document.getElementById('checkid-rfc');
  const elCurp = document.getElementById('checkid-curp');
  const elSubmit = document.getElementById('checkid-submit');
  const elLoader = document.getElementById('checkid-loader');
  const elError = document.getElementById('checkid-error');
  const elWrap = document.getElementById('checkid-results-wrap');
  const elDl = document.getElementById('checkid-dl');
  const elMeta = document.getElementById('checkid-meta');

  /** Solo primitivos legibles; nunca devuelve objetos. */
  function scalarStr(obj, ...keys) {
    if (!obj || typeof obj !== 'object') return '';
    for (let i = 0; i < keys.length; i += 1) {
      const v = obj[keys[i]];
      if (v == null || v === '') continue;
      if (typeof v === 'object') continue;
      const s = String(v).trim();
      if (s) return s;
    }
    return '';
  }

  function nombreDesdeCurp(curpBlock) {
    if (!curpBlock || typeof curpBlock !== 'object') return '';
    const parts = [
      scalarStr(curpBlock, 'nombres', 'Nombres'),
      scalarStr(curpBlock, 'primerApellido', 'PrimerApellido'),
      scalarStr(curpBlock, 'segundoApellido', 'SegundoApellido'),
    ].filter(Boolean);
    return parts.join(' ').trim();
  }

  function formatRegimenesFiscales(val) {
    if (val == null || val === '') return '';
    if (typeof val === 'string' || typeof val === 'number' || typeof val === 'boolean') {
      const s = String(val).trim();
      return s;
    }
    if (Array.isArray(val)) {
      const parts = val.map((item) => {
        if (item == null) return '';
        if (typeof item === 'string' || typeof item === 'number') return String(item).trim();
        if (typeof item !== 'object') return '';
        const desc = scalarStr(item, 'descripcion', 'Descripcion', 'nombre', 'Nombre');
        const cod = scalarStr(item, 'codigo', 'Codigo', 'clave', 'Clave');
        if (desc && cod) return desc + ' (' + cod + ')';
        return desc || cod || '';
      }).filter(Boolean);
      return parts.join('; ') || '';
    }
    if (typeof val === 'object') {
      return formatRegimenesFiscales([val]);
    }
    return '';
  }

  function bloqueEstado69(d) {
    return d.estado69o69B || d.estado69O69B || null;
  }

  /**
   * Mapea json.data (estructura CheckID anidada) a strings legibles.
   */
  function extractCheckidFields(payload) {
    const d = payload && typeof payload === 'object' ? payload : {};
    const rfcBlock = d.rfc && typeof d.rfc === 'object' ? d.rfc : null;
    const curpBlock = d.curp && typeof d.curp === 'object' ? d.curp : null;

    let nombre = scalarStr(rfcBlock, 'razonSocial', 'RazonSocial');
    if (!nombre) {
      const nb = nombreDesdeCurp(curpBlock);
      if (nb) nombre = nb;
    }
    if (!nombre) {
      const e69 = bloqueEstado69(d);
      const det = e69 && typeof e69 === 'object' ? e69.detalles : null;
      if (det && typeof det === 'object') {
        nombre = scalarStr(det, 'nombre', 'Nombre');
      }
    }

    const rfcVal = scalarStr(rfcBlock, 'rfc', 'RFC');
    const curpVal = scalarStr(curpBlock, 'curp', 'CURP') || scalarStr(rfcBlock, 'curp', 'CURP');

    const nssBlock = d.nss && typeof d.nss === 'object' ? d.nss : null;
    const nssVal = scalarStr(nssBlock, 'nss', 'NSS');

    const regBlock = d.regimenFiscal && typeof d.regimenFiscal === 'object' ? d.regimenFiscal : null;
    const regimenVal = formatRegimenesFiscales(
      regBlock && (regBlock.regimenesFiscales != null ? regBlock.regimenesFiscales : regBlock.RegimenesFiscales),
    );

    const cpBlock = d.codigoPostal && typeof d.codigoPostal === 'object' ? d.codigoPostal : null;
    const cpVal = scalarStr(cpBlock, 'codigoPostal', 'CodigoPostal', 'CP');

    const e69 = bloqueEstado69(d);
    let estado69Label = 'Sin información';
    if (e69 && typeof e69 === 'object' && Object.prototype.hasOwnProperty.call(e69, 'conProblema')) {
      if (e69.conProblema === true) estado69Label = 'Con problema';
      else if (e69.conProblema === false) estado69Label = 'Sin problema';
      else estado69Label = 'Sin información';
    }

    return {
      nombre: nombre,
      rfc: rfcVal,
      curp: curpVal,
      nss: nssVal,
      regimen: regimenVal,
      cp: cpVal,
      estado69: estado69Label,
    };
  }

  function bodyFromInputs() {
    const rfc = (elRfc.value || '').trim();
    const curp = (elCurp.value || '').trim();
    const hasRfc = rfc.length >= RFC_MIN;
    const hasCurp = curp.length >= CURP_LEN;
    if (hasRfc && hasCurp) return { rfc };
    if (hasRfc) return { rfc };
    if (hasCurp) return { curp };
    if (rfc) return { rfc };
    if (curp) return { curp };
    return null;
  }

  function setLoading(on) {
    elLoader.hidden = !on;
    elLoader.setAttribute('aria-hidden', on ? 'false' : 'true');
    elSubmit.disabled = !!on;
    elSubmit.setAttribute('aria-busy', on ? 'true' : 'false');
  }

  function setError(text) {
    if (!text) {
      elError.hidden = true;
      elError.textContent = '';
      return;
    }
    elError.textContent = text;
    elError.hidden = false;
  }

  function metaText(v) {
    if (v == null || v === '') return '';
    if (typeof v === 'object') return JSON.stringify(v);
    return String(v);
  }

  function cellText(val, fallback) {
    if (val == null || val === '') return fallback;
    if (typeof val === 'object') return fallback;
    const s = String(val).trim();
    return s || fallback;
  }

  function renderResults(mapped, json) {
    elDl.innerHTML = '';
    const rows = [
      ['Nombre / Razón social', cellText(mapped.nombre, ND)],
      ['RFC', cellText(mapped.rfc, ND)],
      ['CURP', cellText(mapped.curp, ND)],
      ['NSS', cellText(mapped.nss, ND)],
      ['Régimen fiscal', cellText(mapped.regimen, ND)],
      ['Código postal', cellText(mapped.cp, ND)],
      ['Estado 69 / 69-B', cellText(mapped.estado69, 'Sin información')],
    ];
    rows.forEach(([label, val]) => {
      const dt = document.createElement('dt');
      dt.textContent = label;
      const dd = document.createElement('dd');
      dd.textContent = val;
      elDl.appendChild(dt);
      elDl.appendChild(dd);
    });
    const parts = [];
    const ec = metaText(json.error_code);
    if (ec) parts.push('Código: ' + ec);
    const hs = metaText(json.http_status);
    if (hs) parts.push('HTTP: ' + hs);
    elMeta.textContent = parts.length ? parts.join(' · ') : '';
    elWrap.hidden = false;
  }

  async function run() {
    setError('');
    elWrap.hidden = true;
    const body = bodyFromInputs();
    if (!body) {
      setError('Ingresa un RFC (12–13 caracteres) o CURP (18 caracteres) para consultar.');
      return;
    }
    setLoading(true);
    try {
      const res = await fetch('/api/checkid/buscar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify(body),
      });
      const ct = (res.headers.get('content-type') || '').toLowerCase();
      if (!ct.includes('application/json')) {
        setError('Respuesta inesperada del servidor. Intenta de nuevo.');
        return;
      }
      const json = await res.json();
      if (!json.ok) {
        const msg = json.message || json.error_code || 'No se pudo completar la consulta.';
        setError(msg);
        return;
      }
      const raw = json.data;
      const mapped = extractCheckidFields(raw);
      renderResults(mapped, json);
    } catch (e) {
      setError('Error de red al consultar CheckID. Revisa tu conexión e intenta de nuevo.');
    } finally {
      setLoading(false);
    }
  }

  elSubmit.addEventListener('click', run);
})();
</script>
{% endblock %}
